<button
  [type]="type"
  [disabled]="disabled || loading"
  class="btn"
  [ngClass]="[
    'btn--' + variant,
    'btn--' + size,
    fullWidth ? 'btn--full' : '',
    loading ? 'btn--loading' : ''
  ]"
>
  @if (loading) {
    <span class="btn-spinner"></span>
  }
  <span [class.hidden]="loading">{{ label }}</span>
</button>
