@if (label) {
  <label class="input-label">{{ label }}</label>
}
<div class="input-container" [class.has-error]="errorMessage">
  <input
    [type]="inputType"
    [placeholder]="placeholder"
    [formControl]="control"
    class="input-field"
  />
  @if (type === 'password') {
    <button type="button" class="input-toggle" (click)="togglePassword()">
      {{ showPassword ? '🙈' : '👁️' }}
    </button>
  }
</div>
@if (errorMessage) {
  <span class="input-error">{{ errorMessage }}</span>
}
